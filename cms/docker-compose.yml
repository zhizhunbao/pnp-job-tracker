services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pnp
      POSTGRES_PASSWORD: pnp
      POSTGRES_DB: pnp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pnp']
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata:
