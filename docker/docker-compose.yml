# pnp-job-tracker 运行时全栈(单一 compose,项目名 pnp → 容器统一 pnp-* 前缀)。
#   postgres  数据库(发布 :5432 给 host npm run dev;容器内用服务名 postgres 连)
#   cms       Next/Payload 应用(仅 unattended profile 起;开发时用 host npm run dev)
#   jobbank   抓 Job Bank → raw            (etl httpx 镜像)
#   build     清洗→评分→mart→seed(灌库唯一角色,curl host.docker.internal:3000/seed)
#
# 用法:
#   开发:        cd docker && docker compose up -d postgres        # 只起库,cms 用 host npm run dev
#   跑自动机:    cd docker && docker compose up -d                 # postgres+jobbank+build(cms 仍 host)
#   无人值守全栈:cd docker && docker compose --profile unattended up -d --build   # 再加容器化 cms
#   日志 docker compose logs -f  |  停 docker compose --profile unattended down
# 开机自启:Docker Desktop 勾「登录时启动」+ 各容器 restart:unless-stopped。
name: pnp

x-etl: &etl                        # httpx 类源 + build 共用(YAML 锚点)
  build:
    context: ..                    # 仓库根(docker/ 上一级)
    dockerfile: docker/etl/httpx/Dockerfile
  restart: unless-stopped
  working_dir: /repo               # etl/_paths.py 以此为根解析 data/
  volumes:
    - ..:/repo                     # 源码 + data/ 落盘到宿主
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pnp
      POSTGRES_PASSWORD: pnp
      POSTGRES_DB: pnp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pnp']
      interval: 5s
      timeout: 5s
      retries: 10

  jobbank:                         # 抓 Job Bank(只刷 raw/jobbank/)
    <<: *etl
    environment:
      SOURCE: jobbank
      SCRAPE_INTERVAL: '7200'      # 2h
      SINCE_DAYS: '3'
      TZ: EST5EDT                  # 日志用东部时区(glibc 原生,无需 tzdata);postgres 保持 UTC

  pnp:                             # 省提名/AIP 具名清单实时刷新(低频,只刷 raw;build 角色消费灌库)
    <<: *etl
    environment:
      SOURCE: pnp
      SCRAPE_INTERVAL: '604800'    # 周更(清单极少变)
      TZ: EST5EDT

  ee:                              # 联邦 EE 类别(canada.ca/Akamai → 有头 chromium under xvfb,月更,只刷 raw)
    build:
      context: ..                  # 仓库根
      dockerfile: docker/etl/crawl/Dockerfile   # 重镜像:playwright + chromium + xvfb
    restart: unless-stopped
    working_dir: /repo
    volumes:
      - ..:/repo                   # 含持久 profile etl/crawl/.browser-profile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      SOURCE: ee
      SCRAPE_INTERVAL: '2592000'   # 月更
      BROWSER_HEADLESS: '1'        # 无人值守 → 无头 chromium(canada.ca 实测无头直接通)
      PYTHONUNBUFFERED: '1'        # 容器内 python 行缓冲,日志实时出
      TZ: EST5EDT

  build:                           # 跨源清洗→评分→mart→seed(灌库唯一角色)
    <<: *etl
    environment:
      SOURCE: build
      SCRAPE_INTERVAL: '7200'
      SEED_URL: http://host.docker.internal:3000/seed  # host npm 或容器 cms 都通(cms 发布 :3000)
      TZ: EST5EDT                  # 日志东部时区

  cms:                             # 生产容器:仅 --profile unattended 起;开发用 host npm run dev
    profiles: ['unattended']
    build:
      context: ../cms
      dockerfile: Dockerfile       # 需 next.config output:'standalone'(已加)
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    env_file:
      - ../cms/.env                # PAYLOAD_SECRET / OLLAMA_* 等
    environment:
      DATABASE_URI: postgresql://pnp:pnp@postgres:5432/pnp  # 同网络用服务名连库(覆盖 .env 的 localhost)
    volumes:
      - ../data:/data              # seed 读 /data/mart(standalone server cwd=/app,../data=/data)

  # 加 ATS 第一方源时取消注释(Kanata 名录变动少,频率可低):
  # ats:
  #   <<: *etl
  #   environment:
  #     SOURCE: ats
  #     SCRAPE_INTERVAL: '86400'

volumes:
  pgdata:
    name: cms_pgdata               # pin 现有卷,合并项目后不丢已灌的库
