# 多源日更自动机。每个 service = 一个源容器,循环跑该源步骤(见 etl/auto_update.py 的 SOURCES)。
# 抓取源(jobbank/ats…)只刷各自 raw;build 容器做跨源清洗+评分+mart+seed —— 灌库的唯一角色,
# 避免多源抢 mart/seed。与 postgres / cms 解耦:postgres 仍在 cms/docker-compose.yml,cms 仍 `npm run dev`;
# build 只通过 host.docker.internal:3000/seed 调 cms 的纯加载器灌库。
#
# 用法:  cd docker && docker compose up -d --build      # 启动(随 Docker 开机自起)
#         docker compose logs -f                          # 看所有源日志
#         docker compose down                             # 停
# 加新源: 在 etl/auto_update.py 的 SOURCES 登记步骤 → 这里复制一个 service 改 SOURCE。

# jobbank(httpx 抓取)与 build(清洗/评分/mart/seed)都用 httpx 镜像(都只需 python+解析库)。
# 以后 crawl 源用 docker/etl/crawl/、dataset 源用 docker/etl/dataset/ 镜像,各自一个 service。
x-etl: &etl                        # httpx 类源 + build 共用的构建/挂载配置(YAML 锚点)
  build:
    context: ..                    # 仓库根(docker/ 的上一级)
    dockerfile: docker/etl/httpx/Dockerfile
  restart: unless-stopped          # Docker Desktop 设为登录自启 → 开机即跑
  working_dir: /repo               # etl/_paths.py 以此为根解析 data/
  volumes:
    - ..:/repo                     # 源码 + data/ 落盘到宿主,host 上的 cms 直接读到新 mart
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  jobbank:                         # 抓 Job Bank(只刷 raw/jobbank/)
    <<: *etl
    environment:
      SOURCE: jobbank
      SCRAPE_INTERVAL: '7200'      # 2h(Job Bank 本就日更,够用)
      SINCE_DAYS: '3'

  build:                           # 跨源清洗→评分→mart→seed(灌库唯一角色)
    <<: *etl
    environment:
      SOURCE: build
      SCRAPE_INTERVAL: '7200'
      SEED_URL: http://host.docker.internal:3000/seed

  # 加 ATS 第一方源时取消注释(Kanata 名录变动少,频率可低):
  # ats:
  #   <<: *etl
  #   environment:
  #     SOURCE: ats
  #     SCRAPE_INTERVAL: '86400'   # 每天一次
