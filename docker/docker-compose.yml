# pnp-job-tracker 运行时全栈(单一 compose,项目名 pnp → 容器统一 pnp-* 前缀)。
#   postgres  数据库(发布 :5432 给 host npm run dev;容器内用服务名 postgres 连)
#   cms       Next/Payload 应用(仅 unattended profile 起,发布 :3001;本地开发用 host npm run dev 占 :3000)
#   jobbank   抓 Job Bank → raw            (etl httpx 镜像)
#   build     清洗→评分→mart→seed(灌库唯一角色,默认 curl host.docker.internal:3001/seed;本地测试可 export SEED_URL=…:3000)
#
# 用法:
#   开发:        cd docker && docker compose up -d postgres        # 只起库,cms 用 host npm run dev
#   跑自动机:    cd docker && docker compose up -d                 # postgres+jobbank+build(cms 仍 host)
#   无人值守全栈:cd docker && docker compose --profile unattended up -d --build   # 再加容器化 cms
#   日志 docker compose logs -f  |  停 docker compose --profile unattended down
# 开机自启:Docker Desktop 勾「登录时启动」+ 各容器 restart:unless-stopped。
name: pnp

x-etl: &etl                        # httpx 类源 + build 共用(YAML 锚点)
  build:
    context: ..                    # 仓库根(docker/ 上一级)
    dockerfile: docker/etl/httpx/Dockerfile
  restart: unless-stopped
  working_dir: /repo               # etl/_paths.py 以此为根解析 data/
  volumes:
    - ..:/repo                     # 源码 + data/ 落盘到宿主
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pnp
      POSTGRES_PASSWORD: pnp
      POSTGRES_DB: pnp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pnp']
      interval: 5s
      timeout: 5s
      retries: 10

  jobbank:                         # 抓 Job Bank(只刷 raw/jobbank/)
    <<: *etl
    environment:
      SOURCE: jobbank
      HEALTHCHECK_PING_JOBBANK: ${HEALTHCHECK_PING_JOBBANK:-}
      SCRAPE_INTERVAL: '3600'      # 1h(2026-07-16 用户要求数据按小时更新;原 2h)
      SINCE_DAYS: '3'
      TZ: EST5EDT                  # 日志用东部时区(glibc 原生,无需 tzdata);postgres 保持 UTC

  pnp:                             # 省提名/AIP 具名清单实时刷新(低频,只刷 raw;build 角色消费灌库)
    <<: *etl
    environment:
      SOURCE: pnp
      HEALTHCHECK_PING_PNP: ${HEALTHCHECK_PING_PNP:-}
      SCRAPE_INTERVAL: '604800'    # 周更(清单极少变)
      TZ: EST5EDT

  ee:                              # 联邦 EE 类别+抽选(2026-07 改 httpx:类别页无 Akamai、行全量;月更,只刷 raw)
    <<: *etl
    environment:
      SOURCE: ee
      HEALTHCHECK_PING_EE: ${HEALTHCHECK_PING_EE:-}
      SCRAPE_INTERVAL: '2592000'   # 月更
      TZ: EST5EDT
    # 回退:源站重新上 Akamai 时恢复 crawl 重镜像(build dockerfile: docker/etl/crawl/Dockerfile + BROWSER_HEADLESS=1)

  news:                            # 官方移民新闻聚合(E12-06;只刷 raw/news/,build 角色消费灌库)
    <<: *etl
    environment:
      SOURCE: news
      HEALTHCHECK_PING_NEWS: ${HEALTHCHECK_PING_NEWS:-}
      SCRAPE_INTERVAL: '43200'     # 12h(官方公告低频)
      # 翻译策略(Frank 2026-07-18 终版):ETL 预翻停用(budget 0)——翻译走线上实时(朋友 /api/translate,懒翻+DB缓存);
      # 恢复批量=把 NEWS_TRANSLATE_BUDGET 调回 >0(本地 NEWS_LLM_BASE / Anthropic 双后端仍在)
      NEWS_TRANSLATE_BUDGET: ${NEWS_TRANSLATE_BUDGET:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEWS_LLM_BASE: ${NEWS_LLM_BASE:-}
      NEWS_LLM_MODEL: ${NEWS_LLM_MODEL:-qwen3.6:latest}
      TZ: EST5EDT

  enrich:                          # 公司官网富化(E8-04 拆分,2026-07-16「分开来跑」:从 build 轮摘出,6h 独立节奏)
    <<: *etl
    environment:
      SOURCE: enrich
      SCRAPE_INTERVAL: '21600'     # 6h
      TZ: EST5EDT

  backup:                          # 每日 pg_dump 生产库 → backups/(E7-01;家里机=运维盒)
    <<: *etl
    environment:
      SOURCE: backup
      SCRAPE_INTERVAL: '86400'     # 日更
      BACKUP_DATABASE_URI: ${BACKUP_DATABASE_URI:-}   # docker/.env 注入 Supabase 连接串;空=跳过
      HEALTHCHECK_PING_BACKUP: ${HEALTHCHECK_PING_BACKUP:-}
      TZ: EST5EDT

  build:                           # 跨源清洗→评分→mart→seed(灌库唯一角色)
    <<: *etl
    environment:
      SOURCE: build
      HEALTHCHECK_PING_BUILD: ${HEALTHCHECK_PING_BUILD:-}
      SCRAPE_INTERVAL: '7200'
      SEED_URL: ${SEED_URL:-http://host.docker.internal:3001/seed}  # 默认灌 docker cms(:3001);R3 起步档在 docker/.env 覆写为云端 https://pnp-cms.onrender.com/seed
      SEED_TOKEN: ${SEED_TOKEN:-}  # 云端 seed 鉴权(docker/.env 注入;本地空=不带头);upload_mart 推 /api/mart 同用这对(E7-04,Supabase Storage 已退役)
      TZ: EST5EDT                  # 日志东部时区

  cms:                             # 生产容器:仅 --profile unattended 起;本地开发用 host npm run dev(占 :3000)
    profiles: ['unattended']
    build:
      context: ../cms
      dockerfile: Dockerfile       # 需 next.config output:'standalone'(已加)
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3000'                # 发布 :3001(让出 :3000 给 host npm run dev 本地测试;容器内仍 3000)
    env_file:
      - ../cms/.env                # PAYLOAD_SECRET / OLLAMA_* 等
    environment:
      DATABASE_URI: postgresql://pnp:pnp@postgres:5432/pnp  # 同网络用服务名连库(覆盖 .env 的 localhost)
    volumes:
      - ../data:/data              # seed 读 /data/mart(standalone server cwd=/app,../data=/data)

  # 加 ATS 第一方源时取消注释(Kanata 名录变动少,频率可低):
  # ats:
  #   <<: *etl
  #   environment:
  #     SOURCE: ats
  #     SCRAPE_INTERVAL: '86400'

volumes:
  pgdata:
    name: cms_pgdata               # pin 现有卷,合并项目后不丢已灌的库
