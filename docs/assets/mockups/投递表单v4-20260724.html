<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  /* 投递流求职意向表单 v4(Frank:文案专业化+全点选零打字) */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 375px; font-family: "Microsoft YaHei", sans-serif; background: rgba(28,25,23,.45); padding: 24px 12px; }
  .modal { background: #fff; border-radius: 16px; padding: 20px 18px 16px; }
  h3 { font-size: 16px; color: #111827; }
  .sub { font-size: 12.5px; color: #6b7280; margin-top: 4px; }
  .group { margin-top: 16px; }
  .glabel { font-size: 13px; font-weight: 600; color: #374151; }
  .gnote { font-size: 11.5px; color: #9ca3af; font-weight: 400; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .chip {
    border: 1px solid #d1d5db; border-radius: 999px; background: #fff;
    padding: 7px 14px; font-size: 13px; color: #374151;
  }
  .chip.on { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 600; }
  .btn-main {
    display: block; width: 100%; margin-top: 20px; background: #2563eb; color: #fff;
    border: none; border-radius: 10px; padding: 12px 0; font-size: 15px; font-weight: 700; text-align: center;
  }
  .skip { margin-top: 10px; text-align: center; font-size: 12.5px; color: #9ca3af; }
</style>
</head>
<body>
  <div class="modal">
    <h3>求职意向</h3>
    <div class="sub">用于职位匹配与邮件推送,可随时在账户中修改</div>
    <div class="group">
      <div class="glabel">职业方向 <span class="gnote">(可多选)</span></div>
      <div class="chips">
        <span class="chip on">服务业</span><span class="chip">技工</span><span class="chip on">商务行政</span>
        <span class="chip">科技</span><span class="chip">医疗</span><span class="chip">制造</span>
        <span class="chip">工程</span><span class="chip">文体教育</span>
      </div>
    </div>
    <div class="group">
      <div class="glabel">目标地区 <span class="gnote">(可多选)</span></div>
      <div class="chips">
        <span class="chip on">安大略省</span><span class="chip">卑诗省</span><span class="chip">阿尔伯塔省</span>
        <span class="chip">草原两省</span><span class="chip">大西洋四省</span><span class="chip">不限</span>
      </div>
    </div>
    <div class="group">
      <div class="glabel">当前身份</div>
      <div class="chips">
        <span class="chip">学签</span><span class="chip on">毕业工签</span><span class="chip">工签</span>
        <span class="chip">境外申请</span><span class="chip">其他</span>
      </div>
    </div>
    <button class="btn-main">保存并继续投递</button>
    <div class="skip">暂不填写,直接投递</div>
  </div>
</body>
</html>
