<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  /* 投递弹窗效果图(375px 手机优先);仅演示,非实现 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 375px; font-family: "Microsoft YaHei", sans-serif; background: rgba(28,25,23,.45); padding: 24px 12px; }
  .modal { background: #fff; border-radius: 16px; padding: 18px 16px 16px; box-shadow: 0 12px 40px rgba(0,0,0,.2); }
  h3 { font-size: 16px; color: #111827; }
  .job { margin-top: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; }
  .job .t { font-size: 14px; font-weight: 700; color: #111827; }
  .job .zh { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .job .row { font-size: 12.5px; color: #374151; margin-top: 6px; }
  .job .hook { margin-top: 6px; font-size: 12.5px; }
  .job .hook .blur { filter: blur(4px); color: #b45309; font-weight: 700; }
  .job .hook .pro { color: #b45309; font-weight: 600; font-size: 11.5px; }
  .how { margin-top: 12px; font-size: 12.5px; color: #374151; }
  .how b { color: #111827; }
  .how .mail { color: #2563eb; font-weight: 600; }
  .btn-main { display: block; width: 100%; margin-top: 12px; background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 12px 0; font-size: 14.5px; font-weight: 700; text-align: center; }
  .btn-sub { display: block; width: 100%; margin-top: 8px; background: #f3f4f6; color: #374151; border: none; border-radius: 10px; padding: 11px 0; font-size: 13.5px; font-weight: 600; text-align: center; }
  .btn-sub small { display: block; font-weight: 400; font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .orig { margin-top: 12px; text-align: center; font-size: 12.5px; }
  .orig a { color: #2563eb; text-decoration: none; }
  .saved { margin-top: 10px; text-align: center; font-size: 11.5px; color: #9ca3af; }
  .saved .tick { color: #15803d; }
</style>
</head>
<body>
  <div class="modal">
    <h3>投递这个岗</h3>
    <div class="job">
      <div class="t">customer service supervisor - retail</div>
      <div class="zh">零售客服主管(NOC 62010)</div>
      <div class="row">Royal Kerala Foods Inc</div>
      <div class="row">Scarborough,安大略省</div>
      <div class="row">时薪 $38(年薪 $79,040)</div>
      <div class="hook">vs 全省中位 <span class="blur">+77%</span> <span class="pro">⭐ Pro 解锁</span></div>
    </div>
    <div class="how">原帖投递方式:<b>邮箱投递</b> <span class="mail">hiring@royalkerala.ca</span>(实时读取自 Job Bank 原帖)</div>
    <button class="btn-main">📧 打开邮件投递(主题与岗位信息已填好)</button>
    <button class="btn-sub">复制投递要点<small>岗位信息一键打包,贴给你自己的 AI 改简历也行</small></button>
    <div class="orig"><a href="#">去 Job Bank 原帖自行投递 ↗</a></div>
    <div class="saved"><span class="tick">✓</span> 已自动记入「我的求职」,回来可查投递记录</div>
  </div>
</body>
</html>
